<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- displays site properly based on user's device -->

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Advice generator app</title>
  </head>

  <body class="bg-gray-800 flex justify-center items-center min-h-screen p-5">
    <div
      id="container"
      class="bg-gray-600 w-auto h-auto rounded-lg flex flex-col p-5 justify-between items-center text-center"
    >
      <h6 class="text-green-400 font-medium">Advice</h6>

      <div id="card" class="text-white text-xl flex"></div>

      <img
        src="images/pattern-divider-desktop.svg"
        alt=""
        class="hidden md:block"
      />

      <img
        src="images/pattern-divider-mobile.svg"
        alt=""
        class="block md:hidden"
      />

      <div
        id="knopka"
        class="rounded-full p-3 bg-green-400 hover:bg-emerald-400 w-10 -mb-10"
      >
        <img src="images/icon-dice.svg" alt="" />
      </div>
    </div>

    <script>
      const btn = document.getElementById("knopka");
      const card = document.getElementById("card");

      const url = "https://api.kanye.rest/";
      async function sovet() {
        const response = await fetch(url);
        const data = await response.json();
        console.log(data);
        card.innerHTML = `<p>${data.quote}</p>`;
      }
      btn.addEventListener("click", sovet);
      sovet();
    </script>
  </body>
</html>
